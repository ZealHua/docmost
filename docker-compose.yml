services:
  openmemo:
    image: ghcr.io/zealhua/openmemo:latest
    container_name: openmemo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL:-postgresql://openmemo:${POSTGRES_PASSWORD}@db:5432/openmemo}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NODE_ENV: production
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - openmemo:/app/data/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - openmemo-network

  db:
    image: pgvector/pgvector:pg18
    container_name: openmemo-db
    environment:
      POSTGRES_DB: openmemo
      POSTGRES_USER: openmemo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmemo -d openmemo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openmemo-network

  redis:
    image: redis:8
    container_name: openmemo-redis
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory-policy",
        "noeviction",
      ]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openmemo-network

volumes:
  openmemo:
  db_data:
  redis_data:

networks:
  openmemo-network:
    driver: bridge
